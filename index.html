<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Milestones & Achievements</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fa;
            color:#333;
        }

        .container{
            max-width:1000px;
            margin:30px auto;
            padding:20px;
        }

        .card{
            background:#fff;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.12);
            overflow:hidden;
        }

        h1{
            background:#003366;
            color:#fff;
            margin:0;
            padding:20px;
            text-align:center;
        }

        p{
            text-align:center;
            padding:15px;
            font-size:18px;
        }

        .buttons{
            text-align:center;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            padding:12px 24px;
            margin:8px;
            background:#0066cc;
            color:#fff;
            text-decoration:none;
            border-radius:6px;
            font-weight:bold;
        }

        .btn:hover{
            background:#004a99;
        }

        iframe{
            width:100%;
            height:900px;
            border:none;
        }

        footer{
            text-align:center;
            padding:15px;
            color:#777;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Project Milestones & Achievements</h1>

        <p>
            This document highlights key project milestone, client appreciations,
            and significant contributions delivered during major EPC offshore project.
        </p>

        <div class="buttons">
            <a class="btn" href="Milestones_Achieved.pdf" target="_blank">
                Open PDF
            </a>

            <a class="btn" href="Milestones_Achieved.pdf" download>
                Download PDF
            </a>
        </div>

        <iframe src="Milestones_Achieved.pdf"></iframe>

    </div>
</div>

<footer>
    © 2026 Md Habeeb
</footer>

</body>
</html>
